<!DOCTYPE html>
<html>
<head>
    <title>Task Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark text-light">

<div class="container mt-5">
    <div class="card bg-secondary shadow p-4">
        <h2 class="text-center mb-4">Task Manager</h2>

        <form method="POST" class="d-flex mb-3">
            {% csrf_token %}
            <input type="text" name="title" class="form-control me-2" placeholder="Enter Task">
            <button class="btn btn-warning">Add</button>
        </form>

        <ul class="list-group">
            {% for task in tasks %}
            <li class="list-group-item d-flex justify-content-between align-items-center">
                {{ task.title }}
                <a href="/delete/{{ task.id }}/" class="btn btn-danger btn-sm">Delete</a>
            </li>
            {% empty %}
            <li class="list-group-item">No tasks added.</li>
            {% endfor %}
        </ul>
    </div>
</div>

</body>
</html>
